name: CI (Pull Request Validation & Preview Deploy)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools via mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools via mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js App
        run: pnpm run build

      - name: Build (OpenNext for Cloudflare)
        run: pnpm --filter next-pyon cf:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-next-build
          path: next-pyon/.open-next/
          retention-days: 1

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose -f compose.dev.yaml build

      - name: Build prod image
        run: docker compose -f compose.prod.yaml build

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools via mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 Migrations (Staging)
        continue-on-error: true
        run: |
          cd next-pyon
          pnpm wrangler d1 migrations apply next-pyon-stage --remote --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: open-next-build
          path: next-pyon/.open-next

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        run: |
          cd next-pyon
          pnpm wrangler pages deploy .open-next --project-name=next-pyon --branch=preview-${{ github.event.pull_request.number }} > deploy_output.txt
          cat deploy_output.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' deploy_output.txt | head -n 1)
          echo "DEPLOY_URL=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with Deployment URL
        if: steps.deploy.outputs.DEPLOY_URL != ''
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🚀 Cloudflare Pages Preview Deployment Successful!
            🔗 **Preview URL**: ${{ steps.deploy.outputs.DEPLOY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
