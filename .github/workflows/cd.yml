name: CD (Production Deployment)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools via mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 Migrations
        run: |
          cd next-pyon
          pnpm wrangler d1 migrations apply next-pyon-prod --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Next.js App
        run: pnpm run build

      - name: Build (OpenNext for Cloudflare)
        run: pnpm --filter next-pyon cf:build

      - name: Deploy to Cloudflare Pages (Production)
        run: |
          cd next-pyon
          pnpm wrangler pages deploy .open-next --project-name=next-pyon --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
