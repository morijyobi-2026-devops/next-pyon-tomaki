name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter next-pyon-tomaki-app prisma generate --schema ../prisma/schema.prisma

      - name: Apply D1 Migrations (Staging)
        if: github.event_name == 'pull_request'
        run: |
          cd next-pyon
          npx wrangler d1 migrations apply next-pyon-stage --remote --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd next-pyon
          npx wrangler d1 migrations apply next-pyon-prod --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Next.js App
        run: pnpm --filter next-pyon-tomaki-app build:cloudflare

      - name: Deploy to Cloudflare Pages (Staging)
        if: github.event_name == 'pull_request'
        id: deploy-staging
        run: |
          cd next-pyon
          npx wrangler pages deploy .open-next --project-name=next-pyon --branch=preview-${{ github.event.pull_request.number }} > deploy_output.txt
          cat deploy_output.txt
          # Extract deployment URL for PR comments
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' deploy_output.txt | head -n 1)
          echo "DEPLOY_URL=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with Deployment URL
        if: github.event_name == 'pull_request' && steps.deploy-staging.outputs.DEPLOY_URL != ''
        uses: thollander/actions-comment-pull-request@fabd468d3a1a0b97feee5f6b9e499eab0dd903f6 # v2
        with:
          message: |
            🚀 Cloudflare Pages Staging Deployment Successful!
            🔗 **Deployment URL**: ${{ steps.deploy-staging.outputs.DEPLOY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd next-pyon
          npx wrangler pages deploy .open-next --project-name=next-pyon --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
